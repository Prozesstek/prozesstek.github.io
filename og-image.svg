<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Archivo, Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="78%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0F172A"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- brand mark + name -->
  <g transform="translate(80, 78)">
    <rect width="56" height="56" rx="14" fill="#1E293B"/>
    <path d="M16 28h24m0 0l-8-8m8 8l-8 8" fill="none" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="37" fill="#FFFFFF" font-size="26" font-weight="700" letter-spacing="-0.5">Frederik Leckebusch</text>
  </g>

  <!-- headline -->
  <text x="80" y="290" fill="#FFFFFF" font-size="76" font-weight="800" letter-spacing="-2">Manuelle Abläufe</text>
  <text x="80" y="378" fill="#38BDF8" font-size="76" font-weight="800" letter-spacing="-2">automatisch erledigen.</text>

  <!-- subline -->
  <text x="80" y="448" fill="#CBD5E1" font-size="30" font-weight="400">Individuelle Software &amp; Prozessautomatisierung für KMU</text>

  <!-- footer line -->
  <g transform="translate(80, 540)">
    <text x="0" y="0" fill="#64748B" font-size="26" font-weight="500" letter-spacing="0.5">prozesstek.de</text>
    <text x="1040" y="0" fill="#94A3B8" font-size="26" font-weight="500" text-anchor="end">Erfurt · Thüringen</text>
  </g>
</svg>
